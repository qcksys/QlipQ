# release-plz config for the qlipq desktop Cargo workspace.
#
# The crates here are internal path-deps, NOT published to crates.io, so `cargo publish` is skipped
# (`publish = false`). `git_only` (release-plz's "version from git tags" mode, meant for exactly this
# unpublished-crate case) is currently broken for a Cargo workspace in a subdirectory: it opens the
# git repo at the manifest dir (`apps/desktop`) instead of the repo root and errors with "failed to
# open repository" (upstream release-plz #2595). So instead:
#   - the internal crates are not released on their own (`release = false`), and
#   - releases are gated on conventional `feat:`/`fix:` commits (`release_commits`) — without this,
#     release-plz can't tell an unpublished crate is already released and would keep an always-open
#     release PR. With it, a release PR only appears when you intentionally land a release-worthy
#     commit, and it converges after merge (the `chore: release` merge commit doesn't match).
[workspace]
publish = false # never run `cargo publish` — these crates are internal, not on crates.io
release_commits = "^(feat|fix)" # only cut a release when a feat/fix commit lands (no persistent PR)
git_release_enable = false # no GitHub release per crate by default…
git_tag_enable = false # …and no per-crate git tag by default

# The internal crates are an implementation detail of the app — not released independently.
[[package]]
name = "qlipq-core"
release = false

[[package]]
name = "qlipq-ffmpeg"
release = false

# The app is the only released unit: a single tag `vX.Y.Z` plus a GitHub Release. Publishing that
# Release triggers qlipq-desktop-release.yml to build + attach the binaries. NOTE: for that trigger to
# fire, release-plz must create the Release with a PAT (secrets.RELEASE_PLZ_TOKEN) — a Release created
# by the default GITHUB_TOKEN does not trigger other workflows. See release-plz.yml.
[[package]]
name = "qlipq-desktop"
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_enable = true
