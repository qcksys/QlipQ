# release-plz config for the qlipq desktop Cargo workspace.
#
# The crates here are internal path-deps, NOT published to crates.io, so `cargo publish` is skipped
# (`publish = false`). We deliberately do NOT set `git_only` here: its worktree-based version
# detection opens the git repo at the manifest dir (`apps/desktop`), but our `.git` is at the repo
# root, so it errors ("failed to open repository") for this subdirectory Cargo workspace. The default
# registry-based path handles the subdirectory layout correctly (crates absent from crates.io are
# treated as unreleased).
[workspace]
publish = false # never run `cargo publish` — these crates are internal, not on crates.io
git_release_enable = false # don't create a GitHub release per crate…
git_tag_enable = false # …and no per-crate git tag by default

# Only the app gets a single tag, `vX.Y.Z`. That tag triggers qlipq-desktop-release.yml, which
# builds the binaries and creates the GitHub release — so release-plz only tags here (no release).
[[package]]
name = "qlipq-desktop"
git_tag_enable = true
git_tag_name = "v{{ version }}"
